version: "3.4"
services:
    seedemu-ether-client:
        image: handsonsecurity/seedemu-multiarch-etherview:2.0
        container_name: seedemu_ether_view
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        ports:
            - 5000:5000/tcp

    seedemu_internet_map:
        image: handsonsecurity/seedemu-internetmap:2.0
        container_name: seedemu_internet_map
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        privileged: true
        ports:
            - 8080:8080/tcp